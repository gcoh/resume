# Site settings
title: "Gabriel - CV & Portfolio"
description: "Personal website, CV and portfolio"
author: "Gabriel"
github_username: gcoh

# URL configuration
# Projet site (ce repo) : https://gcoh.github.io/resume
# Si tu renommes le repo en gcoh.github.io : https://gcoh.github.io
baseurl: "/resume"
url: "https://gcoh.github.io"

# Language settings
default_lang: en
languages:
  en: English
  fr: Français
  he: עברית

# Build settings
markdown: kramdown

# Plugins (GitHub Pages compatible)
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
